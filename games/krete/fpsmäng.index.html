<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Shooter</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:24px;
    z-index:10;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    color:white;
    font-size:40px;
    pointer-events:none;
}

#start{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    background:#000;
    font-size:32px;
    cursor:pointer;
    z-index:20;
}
</style>
</head>
<body>

<div id="start">KLIKI ET ALUSTADA</div>

<div id="ui">
    Skoor: <span id="score">0</span>
</div>

<div id="crosshair">+</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const scoreText = document.getElementById("score");
const startScreen = document.getElementById("start");

let score = 0;

const player = {
    x: 0,
    y: 0,
    angle: 0,
    speed: 4
};

const keys = {};
const enemies = [];

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

document.addEventListener("mousemove", e => {
    if(document.pointerLockElement === canvas){
        player.angle += e.movementX * 0.002;
    }
});

startScreen.addEventListener("click", () => {
    canvas.requestPointerLock();
    startScreen.style.display = "none";
});

canvas.addEventListener("click", shoot);

function shoot(){

    for(let i = enemies.length - 1; i >= 0; i--){

        const enemy = enemies[i];

        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;

        const angleToEnemy = Math.atan2(dy, dx);

        let diff = Math.abs(angleToEnemy - player.angle);

        if(diff > Math.PI){
            diff = 2 * Math.PI - diff;
        }

        if(diff < 0.15){
            enemies.splice(i,1);
            score++;
            scoreText.textContent = score;
            break;
        }
    }
}

function spawnEnemy(){

    const distance = 300 + Math.random() * 400;
    const angle = Math.random() * Math.PI * 2;

    enemies.push({
        x: player.x + Math.cos(angle) * distance,
        y: player.y + Math.sin(angle) * distance,
        size: 40
    });
}

setInterval(spawnEnemy, 1000);

function update(){

    if(keys["w"]){
        player.x += Math.cos(player.angle) * player.speed;
        player.y += Math.sin(player.angle) * player.speed;
    }

    if(keys["s"]){
        player.x -= Math.cos(player.angle) * player.speed;
        player.y -= Math.sin(player.angle) * player.speed;
    }

    if(keys["a"]){
        player.x += Math.cos(player.angle - Math.PI/2) * player.speed;
        player.y += Math.sin(player.angle - Math.PI/2) * player.speed;
    }

    if(keys["d"]){
        player.x += Math.cos(player.angle + Math.PI/2) * player.speed;
        player.y += Math.sin(player.angle + Math.PI/2) * player.speed;
    }
}

function draw(){

    ctx.fillStyle = "#222";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Põrand
    ctx.fillStyle = "#444";
    ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

    // Lagi
    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,canvas.width,canvas.height/2);

    enemies.forEach(enemy => {

        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;

        const distance = Math.sqrt(dx*dx + dy*dy);

        const angle = Math.atan2(dy, dx) - player.angle;

        const size = 3000 / distance;

        const screenX = Math.tan(angle) * 500 + canvas.width/2;

        if(distance > 20){

            ctx.fillStyle = "red";

            ctx.fillRect(
                screenX - size/2,
                canvas.height/2 - size/2,
                size,
                size
            );
        }

        // Kui vastane liiga lähedal
        if(distance < 30){
            alert("Game Over! Skoor: " + score);
            location.reload();
        }
    });
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
